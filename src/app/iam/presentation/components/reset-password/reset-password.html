<main class="auth-page">
  <section class="auth-brand">
    <h1>EcoMind</h1>
    <p>Aprender a cuidar el planeta empieza contigo</p>
  </section>

  <section class="auth-card">
    <h2>Reset password</h2>
    <p class="auth-copy">Choose a new password for your EcoMind account.</p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        <span>Password</span>
        <input type="password" formControlName="password" placeholder="Enter your new password">
      </label>

      @if (statusMessage()) {
        <p class="auth-status">{{ statusMessage() }}</p>
      }

      @if (errorMessage()) {
        <p class="auth-error">{{ errorMessage() }}</p>
      }

      <button class="auth-primary" type="submit" [disabled]="isSubmitting()">
        Reset password
      </button>
    </form>

    <p class="auth-footer">Remembered it? <a routerLink="/sign-in">Sign In</a></p>
  </section>
</main>
