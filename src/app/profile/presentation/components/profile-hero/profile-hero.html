@if (user; as currentUser) {
  <section class="profile-hero">
    <div class="profile-hero__identity">
      <app-profile-avatar
        [name]="currentUser.name"
        [userId]="currentUser.id"
        [size]="'hero'"
        [avatarUrl]="equippedAvatarUrl"
        [overlayUrl]="equippedOverlayUrl"
        [overlayType]="equippedOverlayType">
      </app-profile-avatar>

      <div class="profile-hero__copy">
        <p class="profile-eyebrow">{{ 'profilePage.hero.eyebrow' | translate }}</p>
        <h1>{{ currentUser.name }}</h1>
        <p class="profile-handle">{{ handle }}</p>
      </div>
    </div>

    <div class="profile-hero__stats">
      <article class="profile-stat">
        <strong>{{ currentUser.ecopoints }}</strong>
        <span>{{ 'profilePage.hero.totalPoints' | translate }}</span>
      </article>

      <article class="profile-stat">
        <strong>{{ friendCount }}</strong>
        <span>{{ 'profilePage.hero.friends' | translate }}</span>
      </article>
    </div>

    <div class="profile-hero__actions">
      @if (isViewingOwnProfile) {
        <button class="profile-action" type="button" (click)="editProfile.emit()">
          {{ 'profilePage.hero.editProfile' | translate }}
        </button>
        <button class="profile-action profile-action--solid" type="button" (click)="shareProfile.emit()">
          {{ 'profilePage.hero.shareProfile' | translate }}
        </button>
      } @else {
        <button class="profile-action" type="button" (click)="shareProfile.emit()">
          {{ 'profilePage.hero.shareProfile' | translate }}
        </button>
        <button
          class="profile-action profile-action--danger"
          type="button"
          [disabled]="saving"
          (click)="removeMember.emit()">
          {{ removeActionLabel }}
        </button>
      }
    </div>
  </section>
}
