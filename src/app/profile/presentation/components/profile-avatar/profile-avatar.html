<div
  class="avatar-shell"
  [class.avatar-shell--hero]="size === 'hero'"
  [class.avatar-shell--header]="size === 'header'">
  @if (avatarUrl && showAvatarImage()) {
    <img
      class="avatar avatar--image"
      [class.avatar--hero]="size === 'hero'"
      [class.avatar--header]="size === 'header'"
      [src]="avatarUrl"
      [alt]="name"
      (error)="hideAvatarImage()">
  }

  @if (!avatarUrl || !showAvatarImage()) {
    <div
      class="avatar"
      [class.avatar--hero]="size === 'hero'"
      [class.avatar--header]="size === 'header'"
      [style.--avatar-hue]="getAvatarHue(userId)">
      {{ getInitials(name) }}
    </div>
  }

  @if (overlayUrl && showOverlayImage()) {
    <img
      class="avatar-overlay"
      [class.avatar-overlay--hero]="size === 'hero'"
      [class.avatar-overlay--header]="size === 'header'"
      [class.avatar-overlay--hat]="overlayType === 'hat' || overlayType === 'bun'"
      [src]="overlayUrl"
      alt="Accesorio"
      (error)="hideOverlayImage()">
  }
</div>
