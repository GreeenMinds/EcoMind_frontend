<nav class="profile-tabs" [attr.aria-label]="'profilePage.tabs.ariaLabel' | translate">
  <button
    class="profile-tab"
    type="button"
    [class.is-active]="activeTab === 'summary'"
    (click)="tabChange.emit('summary')">
    {{ 'profilePage.tabs.summary' | translate }}
  </button>
  <button
    class="profile-tab"
    type="button"
    [class.is-active]="activeTab === 'family'"
    (click)="tabChange.emit('family')">
    {{ 'profilePage.tabs.family' | translate }}
  </button>
  <button
    class="profile-tab"
    type="button"
    [class.is-active]="activeTab === 'progress'"
    (click)="tabChange.emit('progress')">
    {{ 'profilePage.tabs.progress' | translate }}
  </button>
  <button
    class="profile-tab"
    type="button"
    [class.is-active]="activeTab === 'friends'"
    (click)="tabChange.emit('friends')">
    {{ 'profilePage.tabs.friends' | translate }}
  </button>
</nav>
