<section class="auth-page">
  <aside class="auth-brand" aria-label="EcoMind">
    <div class="auth-logo">
      <strong>EcoMind</strong>
      <img src="/assets/images/plantIcon.png" alt="">
    </div>
    <p>Aprender a cuidar el planeta empieza contigo</p>
  </aside>

  <main class="auth-panel">
    <header class="auth-panel__header">
      <h1>Create account</h1>
      <p>Join EcoMind and start building better habits for the planet.</p>
    </header>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="auth-field">
        <label for="name">Name</label>
        <input id="name" type="text" formControlName="name" placeholder="Enter your name" autocomplete="name">
      </div>

      <div class="auth-field">
        <label for="email">Email address</label>
        <input id="email" type="email" formControlName="email" placeholder="Enter your email" autocomplete="email">
      </div>

      <div class="auth-field">
        <label for="birthDate">Birth date</label>
        <input id="birthDate" type="date" formControlName="birthDate" autocomplete="bday">
      </div>

      <div class="auth-field">
        <label for="password">Password</label>
        <input id="password" type="password" formControlName="password" placeholder="Enter your password" autocomplete="new-password">
      </div>

      <div class="auth-field">
        <label for="commitment">First commitment</label>
        <textarea
          id="commitment"
          formControlName="commitment"
          rows="4"
          placeholder="Example: I will recycle and save water every week."></textarea>
      </div>

      <label class="auth-check">
        <input type="checkbox" formControlName="terms">
        <span>I agree to the <a class="auth-link auth-link--quiet" href="#">terms & policy</a></span>
      </label>

      @if (errorMessage()) {
        <p class="auth-status auth-status--error">{{ errorMessage() }}</p>
      }

      <button class="auth-primary" type="submit" [disabled]="isSubmitting()">
        {{ isSubmitting() ? 'Creating account...' : 'Sign up' }}
      </button>
    </form>

    <div class="auth-divider">Or</div>

    <div class="auth-socials">
      <button class="auth-social" type="button" (click)="signInWithProvider('google')" [disabled]="isSubmitting()">
        <span class="auth-social__google">G</span>
        Sign in with Google
      </button>

      <button class="auth-social" type="button" (click)="signInWithProvider('apple')" [disabled]="isSubmitting()">
        <span class="auth-social__apple">A</span>
        Sign in with Apple
      </button>
    </div>

    <p class="auth-footer">
      Have an account?
      <a class="auth-link" routerLink="/sign-in">Sign In</a>
    </p>
  </main>
</section>
