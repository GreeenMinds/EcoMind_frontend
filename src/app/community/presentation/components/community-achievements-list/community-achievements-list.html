<section class="achievements">
  <h2>Community Achievements</h2>

  <div class="filters">
    <button [class.active]="period === 'all'" (click)="periodChange.emit('all')">All</button>
    <button [class.active]="period === 'week'" (click)="periodChange.emit('week')">This week</button>
    <button [class.active]="period === 'month'" (click)="periodChange.emit('month')">This month</button>
  </div>

  <div class="list">
    @for (summary of achievements; track summary.achievement.id + '-' + summary.date) {
      <app-community-achievement-card [summary]="summary"></app-community-achievement-card>
    } @empty {
      <p>No achievements to show.</p>
    }
  </div>
</section>
