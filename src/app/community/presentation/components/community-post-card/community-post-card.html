<article class="post-card">
  <app-profile-avatar
    size="header"
    [name]="authorName"
    [userId]="authorId"
    [avatarUrl]="avatarUrl"
    [overlayUrl]="overlayUrl"
    [overlayType]="overlayType">
  </app-profile-avatar>

  <div class="post-content">
    <div class="post-header">
      <div>
        <h3>{{ authorName }}</h3>
        <span>{{ 'community.post.justNow' | translate }}</span>
      </div>

      <strong class="points">
        @if (summary.post.points > 0) {
          +{{ summary.post.points }} pts
        } @else {
          {{ 'community.post.noPoints' | translate }}
        }
      </strong>
    </div>

    <p>{{ summary.post.content }}</p>

  </div>

  @if (summary.post.image_url) {
    <img [src]="summary.post.image_url" [alt]="summary.post.content">
  }
</article>
