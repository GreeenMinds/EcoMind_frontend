<article class="event-card">
  <div class="event-copy">
    <h3>{{ summary.event.name }}</h3>
    <p>{{ summary.event.description }}</p>
  </div>

  @if (summary.event.image_url) {
    <img [src]="summary.event.image_url" [alt]="summary.event.name">
  }

  <div class="actions">
    <button
      class="join"
      [class.joined]="summary.joined"
      [disabled]="summary.joined"
      (click)="join.emit(summary)">
      {{ (summary.joined ? 'community.eventCard.alreadyJoined' : 'community.eventCard.joinNow') | translate }}
    </button>

    @if (summary.joined) {
      <button
        class="cancel"
        [attr.aria-label]="'community.eventCard.cancelRegistration' | translate"
        [title]="'community.eventCard.cancelRegistration' | translate"
        (click)="cancel.emit(summary)">
        ×
      </button>
    }

    @if (summary.canDelete) {
      <button
        class="delete"
        [attr.aria-label]="'community.eventCard.deleteEvent' | translate"
        [title]="'community.eventCard.deleteEvent' | translate"
        (click)="delete.emit(summary)">
        {{ 'community.eventCard.delete' | translate }}
      </button>
    }
  </div>
</article>
