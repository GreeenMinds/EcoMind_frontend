<section class="feed">
  <header class="section-heading">
    <div>
      <h2>{{ 'community.title.feed' | translate }}</h2>
      <p>{{ 'community.subtitle.feed' | translate }}</p>
    </div>

    <button type="button" class="create-post" (click)="createPost.emit()">
      {{ 'community.actions.createPost' | translate }}
    </button>
  </header>

  <div class="post-list">
    @for (summary of posts; track summary.post.id) {
      <app-community-post-card
        [summary]="summary"
        (selectReaction)="selectReaction.emit($event)">
      </app-community-post-card>
    } @empty {
      <p class="empty">{{ 'community.emptyPosts' | translate }}</p>
    }
  </div>
</section>
