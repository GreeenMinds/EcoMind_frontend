<section class="events-layout">
  <div>
    <header class="section-heading">
      <h2>{{ 'community.title.events' | translate }}</h2>
      <p>{{ 'community.subtitle.events' | translate }}</p>
    </header>

    <button class="create-button" (click)="createEvent.emit()">
      {{ 'community.actions.createEvent' | translate }}
    </button>

    <div class="events-list">
      @for (summary of events; track summary.event.id) {
        <app-community-event-card
          [summary]="summary"
          (join)="joinEvent.emit($event)"
          (cancel)="cancelRegistration.emit($event)"
          (delete)="deleteEvent.emit($event)">
        </app-community-event-card>
      }
    </div>
  </div>

  <app-community-events-map [events]="events"></app-community-events-map>
</section>
