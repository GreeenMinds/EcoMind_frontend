<section class="map-card">
  <h3>Nearby Events</h3>

  <div #map class="map-canvas" aria-label="Map of nearby community events"></div>

  <ul>
    @for (summary of previewEvents; track summary.event.id) {
      <li>
        <span class="dot"></span>
        {{ summary.event.name }} - {{ summary.event.date }}, {{ summary.event.start_time.slice(11, 16) }}
      </li>
    } @empty {
      <li>No mapped events available.</li>
    }
  </ul>
</section>
