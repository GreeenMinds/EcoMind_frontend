<button
  type="button"
  class="quest-card"
  [class.completed]="quest.has_completed_attempt"
  [class.in-progress]="isInProgress()"
  [ngStyle]="getQuestTypeTheme(getDisplayType())"
  (click)="selectQuest()"
>
  <img
    class="quest-card-icon"
    [src]="getQuestTypeIcon(getDisplayType())"
    [alt]="getDisplayType()"
  />
  <span class="quest-card-title">{{ quest.title }}</span>
  <small>{{ 'quests.statuses.' + quest.status | translate }} - {{ quest.progress }}%</small>
</button>
