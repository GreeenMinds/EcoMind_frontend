<button
  type="button"
  class="quest-card"
  [class.completed]="summary.hasCompletedAttempt"
  [class.in-progress]="summary.started && !summary.completed"
  [ngStyle]="getQuestTypeTheme(getDisplayType())"
  (click)="selectQuest()"
>
  <img
    class="quest-card-icon"
    [src]="getQuestTypeIcon(getDisplayType())"
    [alt]="getDisplayType()"
  >
  <span class="quest-card-title">{{ summary.quest.title }}</span>
  <small>{{ 'quests.statuses.' + summary.status | translate }} - {{ summary.progress }}%</small>
</button>
