<header class="app-header">
  <div class="app-header-inner">
    <div class="app-header-left">
      <img src="/assets/images/ecomind_logo.png" alt="EcoMind" class="app-logo">
    </div>

    <div class="app-header-profile" aria-label="User summary">
      <div class="header-stat gem-stat">
        <span class="gem-icon" aria-hidden="true">💎</span>
        <span>
          {{ monetizationStore.gemBalance() > 0 ? monetizationStore.gemBalance() : (currentUser()?.gem_balance ?? 0) }}
        </span>
      </div>

      <div class="header-stat streak-stat">
        <img class="streak-icon" src="/assets/images/plantIcon.png" alt="" aria-hidden="true">
        <span>{{ currentUser()?.streak ?? 0 }}</span>
      </div>

      <div class="profile-photo-wrapper">
        @if (equippedAvatarUrl()) {
          <img
            class="profile-photo profile-photo--img"
            [src]="equippedAvatarUrl()"
            [alt]="currentUser()?.name ?? 'Avatar'"
            onerror="this.style.display='none'; this.nextElementSibling.style.display='grid'">
          <div
            class="profile-photo"
            style="display:none"
            [style.--avatar-hue]="getAvatarHue(currentUser()?.id)"
            aria-label="Current user">
            {{ getInitials(currentUser()?.name) }}
          </div>
        } @else {
          <div
            class="profile-photo"
            [style.--avatar-hue]="getAvatarHue(currentUser()?.id)"
            aria-label="Current user">
            {{ getInitials(currentUser()?.name) }}
          </div>
        }
      </div>
    </div>
  </div>
</header>

<div class="app-layout">
  <app-sidebar></app-sidebar>

  <main class="app-content">
    <router-outlet></router-outlet>
  </main>
</div>
